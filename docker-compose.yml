services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: flight-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_MESSAGE_MAX_BYTES: "5242880"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "5242880"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs

  redis:
    image: redis:7-alpine
    container_name: flight-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: flight-clickhouse
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_DB: flight_tracking
      CLICKHOUSE_USER: flight
      CLICKHOUSE_PASSWORD: flight
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  postgres:
    image: postgres:16-alpine
    container_name: flight-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: flight_tracking
      POSTGRES_USER: flight
      POSTGRES_PASSWORD: flight
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  kafka-data:
  redis-data:
  clickhouse-data:
  postgres-data:
